<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 280" width="300" height="280">
  <!-- White background -->
  <rect width="300" height="280" fill="white"/>

  <!-- Body shadow -->
  <ellipse cx="150" cy="230" rx="70" ry="18" fill="#c8e6c9" opacity="0.5"/>

  <!-- Body -->
  <ellipse cx="150" cy="185" rx="78" ry="70" fill="#6ec06e"/>
  <ellipse cx="150" cy="185" rx="78" ry="70" fill="url(#bodyGrad)"/>

  <!-- Belly -->
  <ellipse cx="150" cy="200" rx="48" ry="45" fill="#b8e8b8"/>

  <!-- Back spots -->
  <circle cx="110" cy="160" r="14" fill="#5aab5a" opacity="0.6"/>
  <circle cx="190" cy="165" r="10" fill="#5aab5a" opacity="0.5"/>
  <circle cx="155" cy="155" r="7" fill="#5aab5a" opacity="0.4"/>

  <!-- Left arm (raised, sad) -->
  <path d="M 80 175 Q 55 155 50 140" stroke="#5aab5a" stroke-width="16" fill="none" stroke-linecap="round"/>
  <ellipse cx="48" cy="135" rx="12" ry="8" fill="#6ec06e" transform="rotate(-20 48 135)"/>

  <!-- Right arm (reaching out for petting) -->
  <path d="M 220 175 Q 245 160 265 155" stroke="#5aab5a" stroke-width="16" fill="none" stroke-linecap="round"/>
  <ellipse cx="270" cy="153" rx="12" ry="8" fill="#6ec06e" transform="rotate(15 270 153)"/>

  <!-- Feet -->
  <ellipse cx="118" cy="248" rx="26" ry="12" fill="#5aab5a"/>
  <ellipse cx="182" cy="248" rx="26" ry="12" fill="#5aab5a"/>

  <!-- Head -->
  <ellipse cx="150" cy="125" rx="62" ry="54" fill="#6ec06e"/>

  <!-- Eyes - slightly sad/concerned -->
  <ellipse cx="122" cy="112" rx="18" ry="17" fill="white"/>
  <ellipse cx="178" cy="112" rx="18" ry="17" fill="white"/>
  <circle cx="125" cy="114" r="11" fill="#1a1a2e"/>
  <circle cx="181" cy="114" r="11" fill="#1a1a2e"/>
  <circle cx="129" cy="109" r="4" fill="white"/>
  <circle cx="185" cy="109" r="4" fill="white"/>
  <!-- sad eyebrows -->
  <path d="M 110 98 Q 122 94 132 99" stroke="#3a7a3a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 168 99 Q 178 94 190 98" stroke="#3a7a3a" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Blush -->
  <ellipse cx="105" cy="128" rx="14" ry="9" fill="#ff9eb5" opacity="0.6"/>
  <ellipse cx="195" cy="128" rx="14" ry="9" fill="#ff9eb5" opacity="0.6"/>

  <!-- Mouth - slight frown -->
  <path d="M 135 143 Q 150 138 165 143" stroke="#3a7a3a" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Gradient defs -->
  <defs>
    <radialGradient id="bodyGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#80d080"/>
      <stop offset="100%" stop-color="#4a9a4a" stop-opacity="0.4"/>
    </radialGradient>
  </defs>

  <!-- Text -->
  <text x="150" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3a7a3a" font-style="italic">frog is here 🐸</text>
</svg>
